# ===========================================================================
# HINATION — production stack.
#
#   Bring the whole stack up (builds all images in parallel, then runs):
#       docker compose up --build -d
#
#   The `scheduler` service pulls live NOAA GFS weather on start and every
#   HINATION_REFRESH_INTERVAL_HOURS, writing the forecast the API serves.
#   Tune the pipeline via a root .env file (see .env.example).
#
# Ports:  nginx 8083 |  frontend 1111  |  backend 1112
# ===========================================================================
name: hination

# Shared backend/pipeline config — merged into both the API and the scheduler
# so they agree on data location and live-GFS settings. Overridable via .env.
x-pipeline-env: &pipeline-env
  HINATION_PREDICTIONS_DIR: /app/hination/data/predictions
  HINATION_USE_V2_MODEL: ${HINATION_USE_V2_MODEL:-true}
  HINATION_GFS_URL: ${HINATION_GFS_URL:-https://api.open-meteo.com/v1/forecast}
  HINATION_GFS_MODEL: ${HINATION_GFS_MODEL:-gfs_seamless}
  HINATION_FORECAST_DAYS: ${HINATION_FORECAST_DAYS:-7}
  HINATION_TIMEZONE: ${HINATION_TIMEZONE:-Asia/Ho_Chi_Minh}
  HINATION_GFS_TIMEOUT: ${HINATION_GFS_TIMEOUT:-30}
  HINATION_SEED_ANTECEDENT: ${HINATION_SEED_ANTECEDENT:-true}
  HINATION_ERA5_ARCHIVE_URL: ${HINATION_ERA5_ARCHIVE_URL:-https://archive-api.open-meteo.com/v1/archive}
  HINATION_REFRESH_INTERVAL_HOURS: ${HINATION_REFRESH_INTERVAL_HOURS:-1}

services:
  # ---- FastAPI forecast API (Python) -----------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: hination-backend
    environment:
      <<: *pipeline-env
    volumes:
      - backend-data:/app/hination/data
    ports:
      - "1112:1112"
    networks:
      - hination-net
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:1112/healthz').getcode()==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Next.js frontend -------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: hination-frontend
    environment:
      NODE_ENV: production
      # Reach the backend over the internal Docker network.
      HINATION_API_BASE_URL: http://backend:1112
      # Optional runtime integrations — set these in a root .env file to enable.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      BRAVE_SEARCH_BASE_URL: ${BRAVE_SEARCH_BASE_URL:-}
      BRAVE_SEARCH_COUNTRY: ${BRAVE_SEARCH_COUNTRY:-}
      HINATION_TILE_URL: ${HINATION_TILE_URL:-}
      AREA_BRIEF_TTL_MINUTES: ${AREA_BRIEF_TTL_MINUTES:-}
    volumes:
      - frontend-data:/app/hination-fe/data
    ports:
      - "1111:1111"
    networks:
      - hination-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ---- Nginx reverse proxy -------------------------------------------
  # Shared host: port 80 is owned by the host-level proxy, and each stack's
  # nginx takes a high port (e-comm 8081, wms 8082) -> hination uses 8083.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hination-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ---- Live forecast refresher (runs by default) -----------------------
  # Pulls NOAA GFS on start + every HINATION_REFRESH_INTERVAL_HOURS and writes
  # the forecast JSON into the shared backend-data volume the API reads from.
  scheduler:
    image: hination-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "-m", "model.scheduler"]
    environment:
      <<: *pipeline-env
    volumes:
      - backend-data:/app/hination/data
    networks:
      - hination-net
    depends_on:
      - backend
    restart: unless-stopped

# All services share one explicit bridge network so service-name DNS
# (frontend -> http://backend:1112) always resolves, and the stack stays
# isolated from the other stacks on this shared host.
networks:
  hination-net:
    driver: bridge

volumes:
  backend-data:
  frontend-data:

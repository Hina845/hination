# ===========================================================================
# Reverse proxy for HINATION.
#   /api/v1/  -> backend  (FastAPI forecast API, :1112)
#   /healthz  -> backend  (API health)
#   /         -> frontend (Next.js app + its own /api/areas/*, :1111)
# ===========================================================================

upstream hination_frontend {
    server frontend:1111;
}

upstream hination_backend {
    server backend:1112;
}

server {
    listen 80;
    server_name _;

    # Reasonable upload ceiling; tune as needed.
    client_max_body_size 10m;

    # ---- Forecast API (Python/FastAPI) ----
    location /api/v1/ {
        proxy_pass         http://hination_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass       http://hination_backend;
        proxy_set_header Host $host;
    }

    # ---- Frontend (Next.js) — catch-all, includes its own /api/areas/* ----
    location / {
        proxy_pass         http://hination_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
